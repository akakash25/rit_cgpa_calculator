<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenGrade - Calming CGPA Calculator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Hanken+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#444749",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#191c1e",
                    "surface-container-high": "#dce9ff",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#eaf1ff",
                    "surface": "#f8f9ff",
                    "secondary-fixed-dim": "#b9c8d7",
                    "secondary-fixed": "#d5e4f3",
                    "primary-container": "#70b8ff",
                    "on-secondary-fixed": "#0f1d28",
                    "tertiary-fixed": "#e0e3e5",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "secondary-container": "#d5e4f3",
                    "secondary": "#52606c",
                    "on-tertiary-container": "#424547",
                    "outline-variant": "#c0c7d2",
                    "on-primary-fixed": "#001d34",
                    "inverse-primary": "#9bcbff",
                    "inverse-surface": "#233144",
                    "primary-fixed-dim": "#9bcbff",
                    "surface-variant": "#d5e3fc",
                    "surface-container-low": "#eff4ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-background": "#0d1c2e",
                    "primary-fixed": "#d0e4ff",
                    "on-secondary-container": "#586673",
                    "tertiary": "#5c5f61",
                    "surface-bright": "#f8f9ff",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#d5e3fc",
                    "tertiary-container": "#b0b3b5",
                    "on-primary-container": "#004877",
                    "on-surface": "#0d1c2e",
                    "error": "#ba1a1a",
                    "surface-container": "#e6eeff",
                    "primary": "#0062a0",
                    "on-primary-fixed-variant": "#004a7a",
                    "on-surface-variant": "#404750",
                    "surface-tint": "#0062a0",
                    "surface-dim": "#ccdbf3",
                    "on-secondary-fixed-variant": "#3a4854",
                    "outline": "#717881",
                    "background": "#f8f9ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding": "24px",
                    "stack-gap": "12px",
                    "unit": "8px",
                    "gutter": "16px",
                    "section-gap": "40px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "display-lg-mobile": ["Manrope"],
                    "body-md": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "display-lg": ["Manrope"],
                    "body-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(112, 184, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(112, 184, 255, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(112, 184, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(112, 184, 255, 0.15);
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .input-underlined {
            background: rgba(112, 184, 255, 0.05);
            border: none;
            border-bottom: 2px solid rgba(112, 184, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-underlined:focus {
            outline: none;
            border-bottom-color: #0062a0;
            box-shadow: 0 4px 12px rgba(0, 98, 160, 0.05);
            background: rgba(112, 184, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(112, 184, 255, 0.2); border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface custom-scrollbar pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-md shadow-[0_10px_30px_rgba(112,184,255,0.1)] flex justify-between items-center px-container-padding h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="cloud">cloud</span>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim">ZenGrade</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="max-w-[600px] mx-auto pt-24 px-container-padding space-y-section-gap">
<!-- Live GPA Section -->
<section class="flex flex-col items-center justify-center space-y-gutter">
<div class="relative w-48 h-48 flex items-center justify-center">
<svg class="w-full h-full">
<circle cx="96" cy="96" fill="none" r="88" stroke="#e6eeff" stroke-width="8"></circle>
<circle class="progress-ring-circle" cx="96" cy="96" fill="none" id="gpa-ring" r="88" stroke="#0062a0" stroke-dasharray="552.92" stroke-dashoffset="552.92" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-display-lg text-display-lg-mobile text-primary" id="gpa-display">0.00</span>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Predicted CGPA</span>
</div>
</div>
<p class="text-center text-on-surface-variant font-body-md px-8">
                Your future is clear. Keep adding courses to see your academic trajectory.
            </p>
</section>
<!-- Course List Section -->
<section class="space-y-stack-gap" id="course-container">
<!-- Initial Empty State or Template -->
<div class="text-center py-unit">
<h2 class="font-headline-md text-secondary mb-gutter">Current Semester</h2>
</div>
<div class="space-y-gutter" id="course-list">
<!-- Dynamic cards go here -->
</div>
<!-- Action Buttons -->
<div class="pt-stack-gap flex flex-col items-center gap-gutter">
<button class="bg-primary-container text-on-primary-container px-10 py-4 rounded-full font-bold flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-md" onclick="addCourse()">
<span class="material-symbols-outlined" data-icon="add">add</span>
                    Add Course
                </button>
</div>
</section>
</main>
<!-- Footer -->
<footer class="w-full py-section-gap flex justify-center items-center mt-auto">
<p class="font-label-caps text-label-caps text-tertiary uppercase">Akash.V-AIDS-"A"</p>
</footer>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-unit pb-4 bg-surface/90 dark:bg-surface/90 backdrop-blur-lg shadow-[0_-5px_20px_rgba(112,184,255,0.05)] rounded-t-xl z-50">
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
<span class="font-label-caps text-label-caps mt-1">Calculate</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container/60 dark:text-on-secondary-fixed-variant hover:text-primary-container transition-colors active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-caps text-label-caps mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container/60 dark:text-on-secondary-fixed-variant hover:text-primary-container transition-colors active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps mt-1">Profile</span>
</a>
</nav>
<script>
        let courseCount = 0;
        const gradeMap = { 'S': 10, 'A': 9, 'B': 8, 'C': 7, 'D': 6, 'E': 5, 'F': 0 };

        function addCourse() {
            courseCount++;
            const list = document.getElementById('course-list');
            const card = document.createElement('div');
            card.className = 'glass-card p-6 rounded-xl flex flex-col md:flex-row items-center gap-gutter animate-in fade-in slide-in-from-bottom-4 duration-300';
            card.id = `course-${courseCount}`;
            
            card.innerHTML = `
                <div class="flex-grow w-full">
                    <label class="font-label-caps text-label-caps text-secondary block mb-1">COURSE NAME</label>
                    <input type="text" placeholder="e.g. Design Systems" class="input-underlined w-full px-2 py-2 text-body-lg font-semibold text-primary rounded-t-md">
                </div>
                <div class="flex gap-gutter w-full md:w-auto">
                    <div class="w-24">
                        <label class="font-label-caps text-label-caps text-secondary block mb-1">CREDITS</label>
                        <input type="number" value="3" min="1" max="10" onchange="updateGPA()" class="input-underlined w-full px-2 py-2 text-center text-body-lg font-bold text-primary rounded-t-md credit-input">
                    </div>
                    <div class="flex-grow md:w-32">
                        <label class="font-label-caps text-label-caps text-secondary block mb-1">GRADE</label>
                        <select onchange="updateGPA()" class="input-underlined w-full px-2 py-2 text-body-lg font-bold text-primary rounded-t-md grade-select bg-transparent">
                            <option value="S">S</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                        </select>
                    </div>
                    <button onclick="removeCourse(${courseCount})" class="self-end pb-2 text-error hover:text-error/80 transition-colors">
                        <span class="material-symbols-outlined" data-icon="delete">delete</span>
                    </button>
                </div>
            `;
            list.appendChild(card);
            updateGPA();
        }

        function removeCourse(id) {
            const el = document.getElementById(`course-${id}`);
            el.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                el.remove();
                updateGPA();
            }, 200);
        }

        function updateGPA() {
            const credits = document.querySelectorAll('.credit-input');
            const grades = document.querySelectorAll('.grade-select');
            
            let totalCredits = 0;
            let weightedSum = 0;

            credits.forEach((input, index) => {
                const c = parseFloat(input.value) || 0;
                const g = gradeMap[grades[index].value] || 0;
                totalCredits += c;
                weightedSum += (c * g);
            });

            const gpa = totalCredits > 0 ? (weightedSum / totalCredits) : 0;
            const formattedGpa = gpa.toFixed(2);
            
            // Animate number
            document.getElementById('gpa-display').innerText = formattedGpa;

            // Animate Ring
            const ring = document.getElementById('gpa-ring');
            const radius = 88;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (gpa / 10) * circumference;
            ring.style.strokeDashoffset = offset;
            
            // Color Shift
            if(gpa >= 9) ring.style.stroke = "#0062a0";
            else if(gpa >= 7) ring.style.stroke = "#70b8ff";
            else ring.style.stroke = "#52606c";
        }

        // Initialize with 3 courses
        window.onload = () => {
            addCourse();
            addCourse();
            addCourse();
        }
    </script>
</body></html>
